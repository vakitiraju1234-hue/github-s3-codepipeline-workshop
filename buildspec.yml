version: 0.2

phases:
  install:
    commands:
      - echo "No installation needed for static HTML"
  pre_build:
    commands:
      - echo "Preparing build..."
  build:
    commands:
      - echo "Building static HTML site"
      - mkdir -p output
      - rsync -av --exclude 'output' ./ output/
      - rm -f output/buildspec.yml
  post_build:
    commands:
      - echo "Build complete - $(ls -la output/)"
      - |
        if [ -n "$CLOUDFRONT_DIST_ID" ]; then
          echo "Invalidating CloudFront cache..."
          aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DIST_ID --paths "/*"
        else
          echo "No CloudFront distribution configured, skipping invalidation."
        fi

artifacts:
  files:
    - '**/*'
  base-directory: output
